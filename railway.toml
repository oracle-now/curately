# railway.toml — root-level fallback only
# Each service should be configured in the Railway dashboard with its own Root Directory.
#
# Service setup in Railway dashboard:
#   api              → Root Directory: apps/api    | Build: npm install && npm run build | Start: npx prisma migrate deploy && npm run start
#   web              → Root Directory: apps/web    | Build: npm install && npm run build | Start: npm run start
#   ingestion-worker → Root Directory: apps/api    | Build: npm install && npm run build | Start: node dist/workers/ingestion.worker.js
#   publish-worker   → Root Directory: apps/api    | Build: npm install && npm run build | Start: node dist/workers/publish.worker.js

[build]
  builder = "nixpacks"
